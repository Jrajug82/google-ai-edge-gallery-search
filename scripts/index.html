<!DOCTYPE html>
<html>
<body>
<script>
async function performSearch(data) {
  let query;
  try {
    const parsed = JSON.parse(data);
    query = parsed.query || data;
  } catch (e) {
    query = data;
  }

  // We add &callback=res to use JSONP logic which is more sandbox-friendly
  const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&callback=res&no_redirect=1`;

  try {
    const response = await fetch(url);
    const text = await response.text();
    
    // JSONP returns "res({ ... });", so we need to strip the "res(" and ");"
    const jsonString = text.replace(/^res\(|\);$/g, '');
    const resultData = JSON.parse(jsonString);

    if (resultData.AbstractText) {
      return resultData.AbstractText;
    } else if (resultData.RelatedTopics && resultData.RelatedTopics.length > 0) {
      return resultData.RelatedTopics[0].Text;
    }
    
    return "No instant results found for " + query;

  } catch (error) {
    // If this hits, the Sandbox is blocking all HTTPS traffic to DDG
    return "Connection Blocked: The app sandbox is preventing the search call.";
  }
}

window.ai_edge_gallery_get_result = performSearch;
</script>
</body>
</html>
