<!DOCTYPE html>
<html>
<body>
<script>
async function performSearch(data) {
  let query;
  try {
    const parsed = typeof data === 'string' ? JSON.parse(data) : data;
    query = parsed.search_keywords || parsed.query || data;
  } catch (e) {
    query = data;
  }

  // Use your Tailscale IP
  const url = `http://100.99.195.105:3400/search?q=${encodeURIComponent(query)}&format=json`;

  try {
    const response = await fetch(url, {
      method: 'GET',
      mode: 'no-cors', // Helps bypass sandbox restrictions
      cache: 'no-cache'
    });

    // Note: 'no-cors' might return an opaque response. 
    // If that happens, we'll try a standard fetch with a shorter timeout.
    const resultData = await response.json();

    if (resultData.results && resultData.results.length > 0) {
      return resultData.results.slice(0, 2).map(r => `${r.title}: ${r.content}`).join("\n\n");
    }
    return "No results found on local server.";
  } catch (error) {
    return "Sandbox Network Error: " + error.message;
  }
}
window.ai_edge_gallery_get_result = performSearch;
</script>
</body>
</html>
