<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>
<script>
async function performSearch(inputData) {
    let query = "";
    try {
        // Handle both JSON string and raw string inputs
        const parsed = typeof inputData === 'string' ? JSON.parse(inputData) : inputData;
        query = parsed.query || inputData;
    } catch (e) {
        query = inputData;
    }

    // Use a very simple, fast API endpoint
    const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_redirect=1`;

    try {
        const response = await fetch(url, {
            method: 'GET',
            headers: { 'Accept': 'application/json' }
        });

        if (!response.ok) return "Search engine is temporarily unavailable.";

        const data = await response.json();
        
        // Prioritize AbstractText, then RelatedTopics
        if (data.AbstractText) {
            return data.AbstractText;
        } else if (data.RelatedTopics && data.RelatedTopics.length > 0) {
            return data.RelatedTopics[0].Text;
        }
        
        return "No instant summary found for " + query;

    } catch (error) {
        // If this returns, the mobile sandbox is blocking the HTTPS call
        return "Network restriction: Please use the local SearXNG skill via Tailscale.";
    }
}

// Attach to window for the Gallery app to find
window.ai_edge_gallery_get_result = performSearch;
</script>
</body>
</html>
