<!DOCTYPE html>
<html>
<body>
<script>
async function performSearch(data) {
  let query;
  try {
    const parsed = typeof data === 'string' ? JSON.parse(data) : data;
    query = parsed.query || data;
  } catch (e) {
    query = data;
  }

  // We use a CORS proxy to bypass the mobile sandbox restriction
  const proxy = "https://corsproxy.io/?";
  const target = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_redirect=1`;
  const url = proxy + encodeURIComponent(target);

  try {
    const response = await fetch(url, {
      method: 'GET',
      headers: {
        'Accept': 'application/json'
      }
    });

    if (!response.ok) return "Search engine connection blocked.";

    const resultData = await response.json();
    let output = "";

    // Priority 1: AbstractText (Direct Answer)
    if (resultData.AbstractText) {
      output = resultData.AbstractText;
    } 
    // Priority 2: Related Topics (Snippets)
    else if (resultData.RelatedTopics && resultData.RelatedTopics.length > 0) {
      output = resultData.RelatedTopics[0].Text;
    }

    return output || "No instant answer found for: " + query;

  } catch (error) {
    return "Network error: The sandbox is still blocking public API calls.";
  }
}

window.ai_edge_gallery_get_result = performSearch;
</script>
</body>
</html>
