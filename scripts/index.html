<!DOCTYPE html>
<html>
<body>
<script>
async function performSearch(data) {
  let query;
  try {
    const parsed = JSON.parse(data);
    query = parsed.query || data;
  } catch (e) {
    query = data;
  }

  // We use the JSONP format (callback) because it's often exempted from strict CORS
  const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_redirect=1&callback=jsonp_callback`;

  try {
    const response = await fetch(url);
    const rawText = await response.text();
    
    // DuckDuckGo returns "jsonp_callback({ ... });"
    // We strip the wrapper to get the JSON
    const jsonString = rawText.substring(rawText.indexOf('(') + 1, rawText.lastIndexOf(')'));
    const result = JSON.parse(jsonString);

    let finalResult = "";
    if (result.AbstractText) {
      finalResult = result.AbstractText;
    } else if (result.RelatedTopics && result.RelatedTopics.length > 0) {
      finalResult = result.RelatedTopics[0].Text;
    }

    // Return the string directly to the model
    return finalResult || "No instant answer available for: " + query;

  } catch (error) {
    // If this fails, the sandbox is blocking public HTTPS. 
    // This is when you should switch to your Tailscale + SearXNG IP.
    return "Network error: The app sandbox is preventing the search. Try using your local server skill.";
  }
}

window.ai_edge_gallery_get_result = performSearch;
</script>
</body>
</html>
