<!DOCTYPE html>
<html>
<body>
<script>
async function performSearch(data) {
  let query;
  try {
    const parsed = typeof data === 'string' ? JSON.parse(data) : data;
    query = parsed.query || data;
  } catch (e) {
    query = data;
  }

  // Use your Windows PC's Tailscale IP (Verified on your port 3400)
  const TAILSCALE_IP = "100.99.195.105"; 
  const url = `http://${TAILSCALE_IP}:3400/search?q=${encodeURIComponent(query)}&format=json`;

  try {
    const response = await fetch(url);
    if (!response.ok) return "Local server error. Check SearXNG logs.";

    const resultData = await response.json();

    if (resultData.results && resultData.results.length > 0) {
      // SearXNG gives real web results, not just abstracts
      return resultData.results
        .slice(0, 3)
        .map((r, i) => `${r.title}: ${r.content}`)
        .join("\n\n");
    }
    
    return "No results found on local engine for: " + query;

  } catch (error) {
    // This will return instantly if the network is the issue
    return "Connection Failed: Check if Tailscale is active on your Pixel 8 Pro.";
  }
}

window.ai_edge_gallery_get_result = performSearch;
</script>
</body>
</html>
