<!DOCTYPE html>
<html>
<body>
<script>
async function performSearch(inputData) {
  let query;
  try {
    const parsed = typeof inputData === 'string' ? JSON.parse(inputData) : inputData;
    query = parsed.query || inputData;
  } catch (e) {
    query = inputData;
  }

  // Adding skip_disambig=1 helps avoid empty results for broad terms
  const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_redirect=1&skip_disambig=1`;

  try {
    const response = await fetch(url, {
      method: 'GET',
      headers: {
        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36'
      }
    });

    const resultData = await response.json();
    let output = "";

    // 1. Primary: The direct Wikipedia-style abstract
    if (resultData.AbstractText) {
      output = resultData.AbstractText;
    } 
    // 2. Secondary: If it's a list (Disambiguation), grab the first topic text
    else if (resultData.RelatedTopics && resultData.RelatedTopics.length > 0) {
      // Find the first object that has 'Text', ignoring sub-topics
      const firstTopic = resultData.RelatedTopics.find(t => t.Text);
      output = firstTopic ? firstTopic.Text : "";
    }

    // Return the result to Gemma
    return output || `No summary found for ${query}. Try being more specific (e.g., 'Telangana State').`;

  } catch (error) {
    return "Network error: Request blocked by mobile sandbox.";
  }
}

window.ai_edge_gallery_get_result = performSearch;
</script>
</body>
</html>
