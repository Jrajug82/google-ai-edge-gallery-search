<!DOCTYPE html>
<html>
<body>
<script>
async function performSearch(inputData) {
  let query;
  try {
    const parsed = typeof inputData === 'string' ? JSON.parse(inputData) : inputData;
    query = parsed.query || inputData;
  } catch (e) {
    query = inputData;
  }

  // We add 'skip_disambig=1' to force a result even if the term is broad
  const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_redirect=1&skip_disambig=1`;

  try {
    const response = await fetch(url, {
      method: 'GET',
      headers: {
        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36'
      }
    });

    const resultData = await response.json();
    let output = "";

    // 1. Try for the Main Abstract (The best result)
    if (resultData.AbstractText) {
      output = resultData.AbstractText;
    } 
    // 2. FALLBACK: If Abstract is empty, use the first 'Related Topic'
    else if (resultData.RelatedTopics && resultData.RelatedTopics.length > 0) {
      // Find the first item that has a 'Text' property
      const topic = resultData.RelatedTopics.find(t => t.Text);
      output = topic ? topic.Text : "";
    }

    // 3. Last Resort
    return output || `I found no instant summary for ${query}. Try searching for something more specific.`;

  } catch (error) {
    return "Network error: The search API is unreachable in this sandbox.";
  }
}

window.ai_edge_gallery_get_result = performSearch;
</script>
</body>
</html>
